<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Pesanan Diproses</title>
</head>
<body style="margin:0;padding:0;background:#f4f4f4;font-family:Arial,sans-serif;">
<table width="100%" cellpadding="0" cellspacing="0" style="padding:30px 0;">
    <tr>
        <td align="center">
            <table width="600" cellpadding="0" cellspacing="0" style="background:#ffffff;border-radius:10px;overflow:hidden;">
                <tr>
                    <td style="background:#2563eb;padding:30px;text-align:center;color:white;">
                        <h1 style="margin:0;">AF Promotion</h1>
                        <p style="margin-top:10px;">
                            Pesanan Sedang Diproses
                        </p>
                    </td>
                </tr>
                <tr>
                    <td style="padding:40px;">
                        <h2 style="margin-top:0;color:#111827;">
                            Pesanan #{{ order.id }} 🚀
                        </h2>
                        <p style="color:#374151;line-height:1.8;">
                            Pesanan Anda sedang memasuki tahap
                            produksi / proses pengemasan.
                        </p>
                        <table width="100%" cellpadding="10" cellspacing="0" style="margin-top:20px;border:1px solid #e5e7eb;border-radius:8px;">
                            <tr>
                                <td><strong>Status</strong></td>
                                <td style="color:#2563eb;"><strong>PROCESSING</strong></td>
                            </tr>
                            <tr>
                                <td><strong>Customer</strong></td>
                                <td>{{ user.username }}</td>
                            </tr>
                        </table>
                        <p style="margin-top:30px;color:#374151;line-height:1.8;">
                            Kami akan mengirimkan notifikasi kembali setelah pesanan dikirim.
                        </p>
                    </td>
                </tr>
                <tr>
                    <td style="background:#f9fafb;padding:20px;text-align:center;color:#6b7280;font-size:14px;">
                        AF Promotion • Professional Printing & Merchandise
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
